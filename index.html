<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
    <!-- Using Chart.js via CDN for simplicity and reliability -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <h1>Expense Tracker</h1>
        
        <!-- Dashboard Summary -->
        <div class="summary-container">
            <div class="summary-card">
                <h3>Balance</h3>
                <p>₹<span id="balance">0</span></p>
            </div>
            <div class="summary-details">
                <div class="summary-item income">
                    <span>Income</span>
                    <p>₹<span id="income">0</span></p>
                </div>
                <div class="summary-item expense">
                    <span>Total Expense</span>
                    <p>₹<span id="expense">0</span></p>
                </div>
            </div>
        </div>

        <!-- Add Transaction Form -->
        <div class="form-container">
            <h3>Add New Transaction</h3>
            <div class="form-group">
                <input type="number" id="amount" placeholder="Amount (e.g. 500)" required>
            </div>
            <div class="form-row">
                <select id="type">
                    <option value="expense">Expense</option>
                    <option value="income">Income</option>
                </select>
                <select id="category" onchange="toggleLendingInput()">
                    <option value="Food">Food</option>
                    <option value="Travel">Travel</option>
                    <option value="Rent">Rent</option>
                    <option value="Bills">Bills</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Lending">Lending</option>
                    <option value="Others">Others</option>
                </select>
            <div class="form-group" id="lending-group" style="display: none;">
                <input type="text" id="lentTo" placeholder="Given to (optional)">
            </div>
            <div class="form-group">
                <input type="text" id="description" placeholder="State your problem / description (e.g. Swiggy order)">
            </div>
            <div class="form-row">
                <select id="mode">
                    <option value="UPI">UPI</option>
                    <option value="Debit Card">Debit Card</option>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Net Banking">Net Banking (NEFT/IMPS)</option>
                    <option value="Cash">Cash</option>
                    <option value="Others">Others</option>
                </select>
                <input type="date" id="date">
            </div>
            <div class="form-group checkbox-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="passthrough">
                    <label for="passthrough">Pass-through ⓘ <span style="font-size: 10px; color: #7f8c8d; display: block;">(Ignore in Balance)</span></label>
                </div>
                <div class="checkbox-item">
                    <input type="checkbox" id="shared" onchange="toggleSharedInput()">
                    <label for="shared">Shared Expense 👥</label>
                </div>
            </div>
            <div id="shared-input-group" class="form-group" style="display: none;">
                <div class="form-row">
                    <div style="flex: 1;">
                        <label style="font-size: 12px; color: #7f8c8d;">Divide among:</label>
                        <input type="number" id="peopleCount" placeholder="e.g. 2" min="2" value="2">
                    </div>
                    <div style="flex: 2;">
                        <label style="font-size: 12px; color: #7f8c8d;">Group Type:</label>
                        <select id="groupType">
                            <option value="Friends">Friends</option>
                            <option value="Family">Family</option>
                            <option value="Roommates">Roommates</option>
                            <option value="Office">Office</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                </div>
                <div class="form-row" style="margin-top: 10px;">
                    <div style="flex: 1;">
                        <label style="font-size: 12px; color: #7f8c8d;">Names (comma separated):</label>
                        <input type="text" id="sharedNames" placeholder="e.g. Amit, Rahul">
                    </div>
                </div>
            </div>
            <button id="addBtn">Add Transaction</button>
        </div>

        <!-- Chart and List Section -->
        <div class="main-content">
            <div class="list-section">
                <h3>Transaction History</h3>
                <ul id="list"></ul>
            </div>
            <div class="chart-section">
                <h3>Expense Distribution</h3>
                <div class="chart-wrapper">
                    <canvas id="chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
