<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-shell">
        <!-- Navigation -->
        <nav class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-wallet"></i>
                <span>TrackFlow</span>
            </div>
            <ul class="nav-links">
                <li class="active"><a href="#"><i class="fa-solid fa-chart-pie"></i><span>Dashboard</span></a></li>
            </ul>
        </nav>

        <!-- Main Content -->
        <main class="main-content-dashboard">
            <header class="top-header">
                <h2>Overview</h2>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" alt="User">
                </div>
            </header>

            <div class="dashboard-grid">
                <!-- Summary Cards -->
                <div class="summary-cards">
                    <div class="summary-card balance-card">
                        <h3>Total Balance</h3>
                        <p>₹<span id="balance">0</span></p>
                    </div>
                    <div class="summary-card income-card">
                        <h3><i class="fa-solid fa-arrow-trend-up"></i> Income</h3>
                        <p>₹<span id="income">0</span></p>
                    </div>
                    <div class="summary-card expense-card">
                        <h3><i class="fa-solid fa-arrow-trend-down"></i> Total Expense</h3>
                        <p>₹<span id="expense">0</span></p>
                    </div>
                </div>

                <!-- Charts & History -->
                <div class="content-row">
                    <div class="chart-section panel">
                        <h3>Expense Distribution</h3>
                        <div class="chart-wrapper">
                            <canvas id="chart"></canvas>
                        </div>
                    </div>
                    
                    <div class="list-section panel">
                        <div class="list-header">
                            <h3>Recent Transactions</h3>
                            <button class="add-btn-desktop" onclick="openModal()"><i class="fa-solid fa-plus"></i> Add New</button>
                        </div>
                        <ul id="list"></ul>
                    </div>
                </div>
            </div>
        </main>

        <!-- Mobile FAB -->
        <button class="fab" onclick="openModal()">
            <i class="fa-solid fa-plus"></i>
        </button>

        <!-- Transaction Modal -->
        <div id="transaction-modal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Add Transaction</h3>
                    <button class="close-btn" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="form-body">
                    <div class="form-group">
                        <input type="number" id="amount" placeholder="Amount (e.g. 500)" required>
                    </div>
                    <div class="form-row">
                        <select id="type">
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                        <select id="category" onchange="toggleLendingInput()">
                            <option value="Food">Food</option>
                            <option value="Travel">Travel</option>
                            <option value="Rent">Rent</option>
                            <option value="Bills">Bills</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Lending">Lending</option>
                            <option value="Others">Others</option>
                        </select>
                    </div>
                    <div class="form-group" id="lending-group" style="display: none;">
                        <input type="text" id="lentTo" placeholder="Given to (optional)">
                    </div>
                    <div class="form-group">
                        <input type="text" id="description" placeholder="State your problem / description (e.g. Swiggy order)">
                    </div>
                    <div class="form-row">
                        <select id="mode">
                            <option value="UPI">UPI</option>
                            <option value="Debit Card">Debit Card</option>
                            <option value="Credit Card">Credit Card</option>
                            <option value="Net Banking">Net Banking (NEFT/IMPS)</option>
                            <option value="Cash">Cash</option>
                            <option value="Others">Others</option>
                        </select>
                        <input type="date" id="date">
                    </div>
                    <div class="form-group checkbox-group">
                        <div class="checkbox-item">
                            <input type="checkbox" id="passthrough">
                            <label for="passthrough">Pass-through ⓘ</label>
                        </div>
                        <div class="checkbox-item">
                            <input type="checkbox" id="shared" onchange="toggleSharedInput()">
                            <label for="shared">Shared Expense 👥</label>
                        </div>
                    </div>
                    <div id="shared-input-group" class="form-group" style="display: none;">
                        <div class="form-row">
                            <div style="flex: 1;">
                                <label style="font-size: 12px; color: #7f8c8d;">Divide among:</label>
                                <input type="number" id="peopleCount" placeholder="e.g. 2" min="2" value="2">
                            </div>
                            <div style="flex: 2;">
                                <label style="font-size: 12px; color: #7f8c8d;">Group Type:</label>
                                <select id="groupType">
                                    <option value="Friends">Friends</option>
                                    <option value="Family">Family</option>
                                    <option value="Roommates">Roommates</option>
                                    <option value="Office">Office</option>
                                    <option value="Others">Others</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row" style="margin-top: 10px;">
                            <div style="flex: 1;">
                                <label style="font-size: 12px; color: #7f8c8d;">Names (comma separated):</label>
                                <input type="text" id="sharedNames" placeholder="e.g. Amit, Rahul">
                            </div>
                        </div>
                    </div>
                    <button class="primary-btn" id="addBtn">Save Transaction</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
